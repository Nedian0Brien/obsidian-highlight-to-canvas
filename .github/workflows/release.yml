name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish BRAT release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build plugin
        run: npm run build

      - name: Validate release metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail

          manifest_version="$(node -p "require('./manifest.json').version")"
          package_version="$(node -p "require('./package.json').version")"

          if [[ "${manifest_version}" != "${package_version}" ]]; then
            echo "manifest.json version (${manifest_version}) must match package.json version (${package_version})." >&2
            exit 1
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag_version="${GITHUB_REF_NAME#v}"
            if [[ "${tag_version}" != "${manifest_version}" ]]; then
              echo "Tag version (${tag_version}) must match manifest.json version (${manifest_version})." >&2
              exit 1
            fi
          fi

          for file in main.js manifest.json styles.css; do
            if [[ ! -s "${file}" ]]; then
              echo "Missing release asset: ${file}" >&2
              exit 1
            fi
          done

          echo "version=${manifest_version}" >> "${GITHUB_OUTPUT}"
          echo "zip_name=pdf-highlight-canvas-${manifest_version}.zip" >> "${GITHUB_OUTPUT}"

      - name: Package release assets
        run: zip "${{ steps.metadata.outputs.zip_name }}" main.js manifest.json styles.css

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', steps.metadata.outputs.version) }}
          name: PDF Highlight Canvas ${{ steps.metadata.outputs.version }}
          draft: false
          prerelease: true
          fail_on_unmatched_files: true
          files: |
            main.js
            manifest.json
            styles.css
            ${{ steps.metadata.outputs.zip_name }}
